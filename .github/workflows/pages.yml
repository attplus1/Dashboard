name: Deploy to GitHub Pages

# Publishes the static dashboard. Enable Pages with source "GitHub Actions"
# in repository Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true          # self-enable Pages if not already on
      - name: Assemble site (exclude bulky history store)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' --exclude '_site' \
            --exclude 'scripts' --exclude '.github' \
            --exclude 'data/history' --exclude 'data/candles' \
            ./ _site/
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build per-ticker candle files into the site
        # Derived from data/history at deploy time so they aren't committed to git.
        run: SITE_DIR=_site python scripts/build_candles.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - id: deployment
        uses: actions/deploy-pages@v4
